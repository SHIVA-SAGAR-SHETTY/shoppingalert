name: Price monitor

on:
  schedule:
    # Every hour, on the hour (UTC). GitHub cron is best-effort and may be delayed.
    - cron: "0 * * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write          # needed to commit updated prices.json

concurrency:
  group: price-monitor
  cancel-in-progress: false

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_RECIPIENTS: ${{ secrets.ALERT_RECIPIENTS }}
        run: python scripts/monitor.py

      - name: Commit updated prices
        run: |
          git config user.name "pricedrop-bot"
          git config user.email "actions@github.com"
          git add data/prices.json
          if git diff --staged --quiet; then
            echo "No price changes to commit."
          else
            git commit -m "chore: update prices [skip ci]"
            git push
          fi
